<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波長範圍與解析度查詢 | OtO Photonics</title>
    <meta name="description" content="OtO Photonics 產品波長範圍與光學解析度查詢工具，輸入型號與需求，即時回傳感測器長度、像素與各狹縫解析度。">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --clr-primary:   #004a99;
            --clr-accent:    #0a84ff;
            --clr-success:   #28a745;
            --clr-warn:      #e6a817;
            --clr-danger:    #d9534f;
            --clr-bg:        #f0f4fb;
            --clr-card:      #ffffff;
            --clr-border:    #dee3ed;
            --clr-text:      #1a1f2e;
            --clr-muted:     #6b7280;
            --radius-lg:     16px;
            --radius-md:     10px;
            --shadow-card:   0 4px 24px rgba(0,0,0,0.09);
            --shadow-hover:  0 8px 36px rgba(0,74,153,0.18);
        }

        body {
            background: var(--clr-bg);
            font-family: 'Noto Sans TC', 'Barlow', sans-serif;
            color: var(--clr-text);
        }

        /* ===== Page Header ===== */
        .spec-hero {
            background: linear-gradient(135deg, #002b6e 0%, #004a99 60%, #1565c0 100%);
            padding: 52px 24px 44px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .spec-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .spec-hero h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin: 0 0 10px;
            letter-spacing: 0.5px;
            position: relative;
        }
        .spec-hero p {
            color: rgba(255,255,255,0.75);
            font-size: 1rem;
            margin: 0;
            position: relative;
        }

        /* ===== Main Layout ===== */
        .spec-wrapper {
            max-width: 820px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        /* ===== Query Form Card ===== */
        .query-card {
            background: var(--clr-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: 32px;
            border: 1px solid var(--clr-border);
            margin-bottom: 28px;
        }
        .query-card h2 {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--clr-primary);
            margin: 0 0 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8f0fe;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== Step Labels ===== */
        .step-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--clr-primary);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 16px;
        }
        .section-divider span {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--clr-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            white-space: nowrap;
        }
        .section-divider::before, .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--clr-border);
        }

        /* ===== Inputs ===== */
        .spec-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .spec-form .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .spec-form .form-group.full {
            grid-column: 1 / -1;
        }
        .spec-form label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--clr-muted);
            letter-spacing: 0.3px;
        }
        .spec-form input {
            padding: 11px 14px;
            border: 1.5px solid var(--clr-border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-family: 'Barlow', 'Noto Sans TC', sans-serif;
            color: var(--clr-text);
            background: #f7f9ff;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
        }
        .spec-form input:focus {
            border-color: var(--clr-accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(10,132,255,0.12);
        }
        .spec-form input::placeholder {
            color: #b0b8c9;
        }

        /* ===== Submit Button ===== */
        .spec-submit-btn {
            margin-top: 24px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--clr-primary), var(--clr-accent));
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Barlow', sans-serif;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(0,74,153,0.25);
        }
        .spec-submit-btn:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0,74,153,0.3);
        }
        .spec-submit-btn:active {
            transform: translateY(0);
        }
        .spec-submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== Loading ===== */
        #spec-loading {
            display: none;
            padding: 28px;
            text-align: center;
        }
        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #e8f0fe;
            border-top-color: var(--clr-accent);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-label {
            color: var(--clr-primary);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .loading-sub {
            color: var(--clr-muted);
            font-size: 0.8rem;
            margin-top: 4px;
        }

        /* ===== Result Sections ===== */
        #resultCard {
            display: none;
            animation: fadeSlideUp 0.4s ease;
        }
        #resultCard.active { display: block; }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result-section {
            background: var(--clr-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--clr-border);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .result-section-header {
            padding: 14px 20px;
            font-size: 0.9rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--clr-border);
        }
        .result-section-header.blue  { background: #eef4ff; color: var(--clr-primary); }
        .result-section-header.green { background: #edfbf2; color: #176d36; }
        .result-section-header.amber { background: #fff8e7; color: #92600a; }
        .result-section-body {
            padding: 20px;
        }

        /* ===== Info Rows ===== */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 0;
            border-bottom: 1px solid #f0f3f8;
            font-size: 0.9rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--clr-muted); font-weight: 600; }
        .info-value { color: var(--clr-text); font-weight: 400; }
        .info-value.highlight { color: var(--clr-danger); font-weight: 700; font-size: 1.05em; }

        /* ===== Sensor Chip ===== */
        .sensor-chip {
            display: inline-block;
            background: #eef4ff;
            border: 1px solid #c2d5f5;
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--clr-primary);
            margin-bottom: 10px;
        }

        /* ===== Waveband Block ===== */
        .waveband-block {
            border: 1px solid #c3e6cb;
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 16px;
        }
        .waveband-block:last-child { margin-bottom: 0; }
        .waveband-title {
            background: #e9fce9;
            padding: 10px 14px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #155724;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .grating-tag {
            background: #155724;
            color: #fff;
            font-size: 0.72rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
        }
        .slit-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .slit-table th {
            background: #f5fdf5;
            padding: 8px 14px;
            text-align: left;
            font-weight: 700;
            color: #155724;
            border-bottom: 1px solid #c3e6cb;
        }
        .slit-table td {
            padding: 9px 14px;
            border-bottom: 1px solid #eef7ee;
        }
        .slit-table tr:last-child td { border-bottom: none; }
        .slit-table tr:hover td { background: #f9fffb; }
        .res-meet {
            color: var(--clr-danger);
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        .res-normal {
            color: #444;
            font-family: 'JetBrains Mono', monospace;
        }
        .badge-meet {
            display: inline-block;
            background: #d4edda;
            color: #155724;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 1px 7px;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
        }

        /* ===== Raw Info ===== */
        .raw-info-block {
            background: #f7f9fb;
            border-radius: 8px;
            padding: 14px 16px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.82em;
            color: #444;
            white-space: pre-wrap;
            border: 1px solid #e8edf5;
            line-height: 1.7;
        }

        /* ===== Warn Notice ===== */
        .notice-block {
            border-radius: var(--radius-md);
            padding: 14px 18px;
            font-size: 0.88rem;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .notice-block.warn {
            background: #fff8e7;
            border: 1px solid #ffd57e;
            color: #92600a;
        }
        .notice-icon { font-size: 1.1rem; flex-shrink: 0; }

        @media (max-width: 600px) {
            .spec-form .form-row { grid-template-columns: 1fr; }
            .spec-hero h1 { font-size: 1.5rem; }
            .query-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html">
                <img src="https://www.otophotonics.com/images/project/551/logo2.png" alt="OtO Photonics Logo" class="logo-img">
            </a>
            <div class="lang-switcher">
                <a href="index.html" id="btn-back-home" class="oto-lang-btn active">
                    <span class="icon-text">&#8617;</span>
                    <span class="lang-text" data-i18n="btnBackHome">返回主頁</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="spec-hero">
        <h1 data-i18n="specTitle">波長範圍與解析度查詢</h1>
        <p data-i18n="specSubtitle">輸入產品型號與需求條件，即時查詢感測器規格與光學解析度</p>
    </div>

    <div class="spec-wrapper">

        <!-- Query Form -->
        <div class="query-card">
            <h2>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                查詢條件輸入
            </h2>

            <form id="specSearchForm" class="spec-form">

                <!-- Step 1: Model -->
                <div class="form-row">
                    <div class="form-group full">
                        <label for="productModel" data-i18n="labelModel">1. 產品型號</label>
                        <input type="text" id="productModel" name="productModel" value="SE2030" required
                               placeholder="例如: SE2030 / SW2960 / PH1014"
                               data-i18n-placeholder="phModel">
                    </div>
                </div>

                <!-- Step 2: Wavelength -->
                <div class="section-divider">
                    <span>波長條件（選填，填入後將自動查詢解析度）</span>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="startWavelength" data-i18n="labelStartW">2. 起始波長 (nm)</label>
                        <input type="number" id="startWavelength" name="startWavelength" step="0.1"
                               placeholder="例如: 380" data-i18n-placeholder="phWave">
                    </div>
                    <div class="form-group">
                        <label for="endWavelength" data-i18n="labelEndW">3. 結束波長 (nm)</label>
                        <input type="number" id="endWavelength" name="endWavelength" step="0.1"
                               placeholder="例如: 850" data-i18n-placeholder="phWave">
                    </div>
                </div>

                <!-- Step 3: Resolution -->
                <div class="section-divider">
                    <span>解析度需求（選填）</span>
                </div>
                <div class="form-row">
                    <div class="form-group full">
                        <label for="resolutionReq" data-i18n="labelReso">4. 光學分辨率需求 (nm)</label>
                        <input type="number" id="resolutionReq" name="resolutionReq" step="0.01"
                               placeholder="例如: 1.0" data-i18n-placeholder="phReso">
                    </div>
                </div>

                <button type="submit" id="searchBtn" class="spec-submit-btn" data-i18n="btnSearch">
                    搜尋
                </button>
            </form>
        </div>

        <!-- Loading -->
        <div id="spec-loading">
            <div class="loading-spinner"></div>
            <div class="loading-label" data-i18n="specLoading">正在查詢中，請稍候...</div>
            <div class="loading-sub">連接 GAS 後端並比對試算表資料</div>
        </div>

        <!-- Results -->
        <div id="resultCard">
            <div id="resultContent"></div>
        </div>

    </div>

    <!-- AI Chat Widget -->
    <div id="ai-chat-widget" class="chat-closed">
        <div id="chat-header">
            <span data-i18n="chatTitle">AI 智能客服</span>
            <button id="close-chat">×</button>
        </div>
        <div id="chat-body">
            <div class="message bot" data-i18n="chatWelcome">您好！我是您的智能助手。有任何關於技術規格或 FAQ 的問題都可以問我喔！</div>
        </div>
        <div id="chat-footer">
            <input type="text" id="chat-input" data-i18n-placeholder="chatPlaceholder">
            <button id="send-chat" data-i18n="chatSend">傳送</button>
        </div>
    </div>
    <button id="chat-toggle-btn">💬</button>

    <!-- Modal -->
    <div id="custom-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-panel">
            <h3 id="modal-title" data-i18n="modalTitle">系統提示</h3>
            <p id="modal-message"></p>
            <button onclick="closeModal()" class="primary-btn" style="margin-top: 20px;" data-i18n="btnOk">確定</button>
        </div>
    </div>

    <!-- Scripts (v2.2 forced cache bust) -->
    <script src="script.js?v=2.2"></script>
    <script src="spec.js?v=2.2"></script>
</body>
</html>
