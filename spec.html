<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波長範圍與解析度查詢 | OtO Photonics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .result-card {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: none;
            border-left: 5px solid var(--primary);
            animation: fadeIn 0.5s ease;
        }
        .result-card.active {
            display: block;
        }
        .result-header {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .result-item {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .result-label {
            font-weight: 600;
            color: #666;
        }
        .result-value {
            font-weight: 400;
            color: #333;
        }
        #spec-loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: var(--primary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html">
                <img src="https://www.otophotonics.com/images/project/551/logo2.png" alt="OtO Photonics Logo" class="logo-img">
            </a>
            <div class="lang-switcher">
                <a href="index.html" id="btn-back-home" class="oto-lang-btn active">
                    <span class="icon-text">🔙</span>
                    <span class="lang-text" data-i18n="btnBackHome">返回主頁</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1 data-i18n="specTitle">波長範圍與解析度</h1>
            <p data-i18n="specSubtitle">請輸入產品型號以查詢對應的感測器資訊</p>
        </header>

        <main class="glass-panel">
            <form id="specSearchForm">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="productModel" data-i18n="labelModel">1. 產品型號</label>
                        <input type="text" id="productModel" name="productModel" value="SE2030" required data-i18n-placeholder="phModel" placeholder="例如: SE2030">
                    </div>
                    <div class="form-group">
                        <label for="startWavelength" data-i18n="labelStartW">2. 起始波長 (nm)</label>
                        <input type="number" id="startWavelength" name="startWavelength" step="0.1" data-i18n-placeholder="phWave" placeholder="例如: 200">
                    </div>
                    <div class="form-group">
                        <label for="endWavelength" data-i18n="labelEndW">3. 結束波長 (nm)</label>
                        <input type="number" id="endWavelength" name="endWavelength" step="0.1" data-i18n-placeholder="phWave" placeholder="例如: 850">
                    </div>
                    <div class="form-group full-width">
                        <label for="resolutionReq" data-i18n="labelReso">4. 光學分辨率需求 (nm)</label>
                        <input type="number" id="resolutionReq" name="resolutionReq" step="0.01" data-i18n-placeholder="phReso" placeholder="例如: 1.0">
                    </div>
                </div>
                <button type="submit" id="searchBtn" class="primary-btn" data-i18n="btnSearch">搜尋</button>
            </form>

            <div id="spec-loading" data-i18n="specLoading">正在搜尋中，請稍候...</div>

            <div id="resultCard" class="result-card">
                <div class="result-header" data-i18n="resHeader">🔍 感測器查詢結果</div>
                <div id="resultContent">
                    <!-- 結果將由 JS 動態生成 -->
                </div>
            </div>
        </main>
    </div>

    <!-- AI 智能客服小組件 -->
    <div id="ai-chat-widget" class="chat-closed">
        <div id="chat-header">
            <span data-i18n="chatTitle">AI 智能客服</span>
            <button id="close-chat">×</button>
        </div>
        <div id="chat-body">
            <div class="message bot" data-i18n="chatWelcome">您好！我是您的智能助手。有任何關於技術規格或 FAQ 的問題都可以問我喔！</div>
        </div>
        <div id="chat-footer">
            <input type="text" id="chat-input" data-i18n-placeholder="chatPlaceholder">
            <button id="send-chat" data-i18n="chatSend">傳送</button>
        </div>
    </div>
    <button id="chat-toggle-btn">💬</button>

    <!-- 自訂專業彈窗 -->
    <div id="custom-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-panel">
            <h3 id="modal-title" data-i18n="modalTitle">系統提示</h3>
            <p id="modal-message"></p>
            <button onclick="closeModal()" class="primary-btn" style="margin-top: 20px;" data-i18n="btnOk">確定</button>
        </div>
    </div>

    <!-- 載入腳本 -->
    <script src="script.js"></script>
    <script src="spec.js"></script>
</body>
</html>
