<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- 設定網頁編碼與視窗縮放，確保行動裝置相容性 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 網頁標題與 SEO 資訊 -->
    <title>客戶需求與問題登記系統 | OtO Photonics</title>
    
    <!-- 引入外部樣式表與 Google Fonts (Barlow & Noto Sans TC) -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 導覽列區域：比照官方網站風格，包含公司 Logo -->
    <!-- 導覽列區域：比照官方網站風格，包含公司 Logo 與語系切換 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="https://www.otophotonics.com/" target="_blank">
                <img src="https://www.otophotonics.com/images/project/551/logo2.png" alt="OtO Photonics Logo" class="logo-img">
            </a>
            <!-- 語系切換按鈕 (簡碼化：預設顯示 TC/SC/EN，滑鼠移入顯示全文) -->
            <div class="lang-switcher">
                <a href="javascript:void(0)" onclick="setLanguage('zh-TW')" id="lang-zh-tw" class="oto-lang-btn">
                    <span class="icon-text">TC</span>
                    <span class="lang-text">繁體中文</span>
                </a>
                <a href="javascript:void(0)" onclick="setLanguage('zh-CN')" id="lang-zh-cn" class="oto-lang-btn">
                    <span class="icon-text">SC</span>
                    <span class="lang-text">简体中文</span>
                </a>
                <a href="javascript:void(0)" onclick="setLanguage('en')" id="lang-en" class="oto-lang-btn">
                    <span class="icon-text">EN</span>
                    <span class="lang-text">English</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- 頁面標題與簡介 -->
        <header>
            <h1 data-i18n="pageTitle">客戶需求與問題登記</h1>
            <p data-i18n="pageSubtitle">請填寫以下資訊，我們將儘速為您處理</p>
        </header>

        <!-- 主要表單區域：使用毛玻璃效果 (Glassmorphism) 設計 -->
        <main class="glass-panel">
            <form id="registrationForm">
                <div class="form-grid">
                    <!-- 公司名稱 -->
                    <div class="form-group">
                        <label for="companyName" data-i18n="labelCompany">公司名稱</label>
                        <input type="text" id="companyName" name="companyName" required data-i18n-placeholder="placeholderCompany">
                    </div>
                    <!-- 客戶窗口 -->
                    <div class="form-group">
                        <label for="clientContact" data-i18n="labelContact">客戶窗口</label>
                        <input type="text" id="clientContact" name="clientContact" required data-i18n-placeholder="placeholderContact">
                    </div>
                    <!-- 社群軟體類型選擇 -->
                    <div class="form-group">
                        <label for="snsType" data-i18n="labelSNSType">社群軟體類型</label>
                        <select id="snsType" name="snsType">
                            <option value="Line">Line</option>
                            <option value="WhatsApp">WhatsApp</option>
                            <option value="WeChat">WeChat</option>
                        </select>
                    </div>
                    <!-- 通訊帳號輸入 -->
                    <div class="form-group">
                        <label for="snsAccount" data-i18n="labelSNSID">通訊帳號 (ID)</label>
                        <input type="text" id="snsAccount" name="snsAccount" data-i18n-placeholder="placeholderSNSID">
                    </div>
                    <!-- 聯繫郵件 -->
                    <div class="form-group">
                        <label for="email" data-i18n="labelEmail">聯繫郵件</label>
                        <input type="email" id="email" name="email" required placeholder="example@mail.com">
                    </div>
                    <!-- 產品型號 -->
                    <div class="form-group">
                        <label for="productModel" data-i18n="labelProduct">產品型號</label>
                        <input type="text" id="productModel" name="productModel" required placeholder="EX : SE2030-050-VNIR">
                    </div>
                    <!-- 產品序號 -->
                    <div class="form-group">
                        <label for="serialNumber" data-i18n="labelSN">產品序號 (S/N)</label>
                        <input type="text" id="serialNumber" name="serialNumber" data-i18n-placeholder="placeholderSN">
                    </div>
                    <!-- 需求類型選擇 -->
                    <div class="form-group full-width">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <label for="reqType" data-i18n="labelType" style="margin-bottom: 0;">需求類型</label>
                            <a href="spec.html" class="spec-link-btn" style="text-decoration: none; font-size: 0.85rem; color: var(--primary); font-weight: 600; border: 1px solid var(--primary); padding: 5px 12px; border-radius: 8px; transition: all 0.3s; display: flex; align-items: center; gap: 5px;">
                                <span style="font-size: 14px;">🔍</span>
                                <span data-i18n="btnSpecLink">波長範圍與解析度</span>
                            </a>
                        </div>
                        <select id="reqType" name="reqType" required>
                            <option value="" disabled selected data-i18n="optDefault">請選擇類型</option>
                            <option value="產品規格與選型" data-i18n="optSpec">產品規格與選型</option>
                            <option value="技術諮詢" data-i18n="optTech">技術諮詢</option>
                        </select>
                    </div>
                    <!-- 詳細問題描述 -->
                    <div class="form-group full-width">
                        <label for="description" data-i18n="labelDesc">問題描述</label>
                        <textarea id="description" name="description" rows="4" required data-i18n-placeholder="placeholderDesc"></textarea>
                    </div>
                    <!-- 附件或截圖上傳 (支援預覽與管理) -->
                    <div class="form-group full-width">
                        <label for="imageFiles" data-i18n="labelUpload">附件上傳 (可以上傳文件或圖檔，最多 5 個附件)</label>
                        <input type="file" id="imageFiles" name="imageFiles" multiple class="file-input">
                        <!-- 預覽容器 -->
                        <div id="image-preview" class="preview-grid"></div>
                        <small id="file-count-msg" style="color: #666; margin-top: 5px;" data-i18n="uploadHint">您可以選取多個附件進行上報，檔案將自動存入雲端案件資料夾</small>
                    </div>
                </div>
                <!-- 提交按鈕 -->
                <button type="submit" id="submitBtn" class="primary-btn" data-i18n="btnSubmit">提交需求</button>
            </form>
        </main>
    </div>

    <!-- AI 智能客服小組件：提供即時技術諮詢 -->
    <div id="ai-chat-widget" class="chat-closed">
        <!-- 聊天視窗頭部 -->
        <div id="chat-header">
            <span data-i18n="chatTitle">AI 智能客服</span>
            <button id="close-chat">×</button>
        </div>
        <!-- 聊天訊息顯示區域 -->
        <div id="chat-body">
            <div class="message bot" data-i18n="chatWelcome">您好！我是您的智能助手。有任何關於技術規格或 FAQ 的問題都可以問我喔！</div>
        </div>
        <!-- 聊天輸入區域 -->
        <div id="chat-footer">
            <input type="text" id="chat-input" data-i18n-placeholder="chatPlaceholder">
            <button id="send-chat" data-i18n="chatSend">傳送</button>
        </div>
    </div>
    
    <!-- 懸浮式 AI 聊天開啟按鈕 -->
    <button id="chat-toggle-btn">💬</button>

    <!-- 自訂專業彈窗 (取代瀏覽器預設 alert) -->
    <div id="custom-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-panel">
            <h3 id="modal-title" data-i18n="modalTitle">系統提示</h3>
            <p id="modal-message"></p>
            <button onclick="closeModal()" class="primary-btn" style="margin-top: 20px;" data-i18n="btnOk">確定</button>
        </div>
    </div>

    <!-- 提交時的載入狀態顯示 -->
    <div id="loading" class="hidden">提交中...</div>
    
    <!-- 引入主要邏輯腳本 -->
    <script src="script.js"></script>
</body>
</html>
